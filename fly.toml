# fly.toml app configuration file generated for portopt-wcn on 2026-05-13T19:18:31-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'portopt-wcn'
primary_region = 'gru'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  max_machines_running = 2
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
